name: Update

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # Run twice a day to improve odds of getting at least one successful refresh.
    # Syntax reference: https://docs.github.com/en/actions/reference/events-that-trigger-workflows#schedule
    # Recommended tool: https://crontab.guru/
    - cron: "12 5 * * *"
    - cron: "42 11 * * *"

concurrency:
  group: update-feed-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - name: Build feed with retries
        id: build_feed
        continue-on-error: ${{ github.event_name != 'workflow_dispatch' }}
        env:
          GITHUB_PAT: ${{ github.token }}
          REPO: "NotCraft/ArxivFeed"
          VERSION: "latest"
          MATCH: "arxivfeed-.+-x86_64-unknown-linux-musl.tar.gz$"
          RENAME: "arxivfeed.tgz"
        shell: bash
        run: bash .github/scripts/update-feed.sh
      - name: Upload update logs on failure
        if: steps.build_feed.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: update-feed-logs-${{ github.run_id }}
          path: logs/update-feed/
          if-no-files-found: ignore
      - name: Summarize tolerated update failure
        if: github.event_name != 'workflow_dispatch' && steps.build_feed.outcome == 'failure'
        run: |
          {
            echo "## Automatic update did not refresh on this run"
            echo
            echo "The previous published site is still kept as-is."
            echo "Logs were uploaded as an artifact for debugging."
            echo "This run is intentionally left green to avoid failure email noise."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Fail manual runs if the update step failed
        if: github.event_name == 'workflow_dispatch' && steps.build_feed.outcome == 'failure'
        run: exit 1
      - name: Deploy to GitHub Pages
        if: steps.build_feed.outcome == 'success' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target
          force_orphan: true
